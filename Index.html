<!DOCTYPE html>
<html>
<head>
    <base target="_blank">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
    <title>Google Drive</title>
    <style>
        :root {
            --primary: #1a73e8;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            font-family: 'Josefin Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* --- HEADER --- */
        #mainHeader { text-align: center; margin-bottom: 30px; transition: all 0.3s ease; z-index: 10001; }
        .logo-main {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- IFRAME WRAPPER --- */
        #iframeWrapper {
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #000;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #videoIframe {
            width: 100%;
            height: 600px;
            border: none;
            display: block;
        }

        /* --- SEMI-FULLSCREEN CSS --- */
        body.semi-active { padding: 0; overflow: hidden; }
        body.semi-active #mainHeader {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; box-sizing: border-box; border-bottom: 1px solid var(--glass-border);
        }
        body.semi-active .logo-main { font-size: 1.2rem; }
        body.semi-active #iframeWrapper {
            position: fixed; top: 60px; left: 0; width: 100vw; height: calc(100vh - 60px);
            max-width: none; border-radius: 0; margin-top: 0;
        }
        body.semi-active #videoIframe { height: 100%; }

        /* --- UI ELEMENTS --- */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 30px; width: 100%; max-width: 900px; margin-bottom: 20px;
        }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        
        input[type="text"] { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 8px; padding: 12px; color: white; font-family: inherit;
        }

        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
        .btn-sync { background: #8b5cf6; color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-exit { background: #dc2626; color: white; display: none; }
        body.semi-active .btn-exit { display: block; }
        body.semi-active .glass-card { display: none; }

        /* Mirror Button Style */
        #mirrorBtn {
            display: none; /* Hidden by default */
            background: #f59e0b; 
            color: #451a03;
            margin-left: 10px;
        }
    </style>
</head>
<body id="mainBody">

    <header id="mainHeader">
        <div class="logo-main">Sebcoolan Site Search</div>
        <div id="subLogo" style="color: #94a3b8; letter-spacing: 2px; font-size: 0.7rem;">POWERED BY SEBCOOLAN GROUP</div>
        <button class="btn-exit" onclick="toggleSemi()">Return to Normal</button>
    </header>

    <div class="glass-card">
        <div class="controls-grid">
            <div class="input-group">
                <label>Main Portal Loader</label>
                <input type="text" id="urlInput" placeholder="Paste link here...">
                <div style="display:flex; gap:5px;">
                    <button class="btn-primary" onclick="loadUrl()" style="flex:2;">Launch</button>
                    <button class="btn-primary" onclick="saveLink()" style="flex:1;">💾</button>
                </div>
            </div>
            <div class="input-group">
                <label>YouTube ID Sync</label>
                <input type="text" id="ytInput" placeholder="Paste link/Shorts...">
                <button class="btn-sync" onclick="syncYoutube()">Sync "Watchable" Link</button>
            </div>
        </div>
        <div id="actionControls" style="display:none; gap:10px; margin-bottom:10px;">
            <button onclick="toggleSemi()" style="background:#34d399; color:#064e3b;">Semi-Fullscreen</button>
            <button onclick="totalFull()" style="background:#60a5fa; color:#1e3a8a;">Browser Fullscreen</button>
            <button id="mirrorBtn" onclick="switchMirror()">Connection Mirror</button>
        </div>
        <div id="savedList" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
    </div>

    <div id="iframeWrapper">
        <iframe 
            id="videoIframe" 
            allow="fullscreen" 
            srcdoc="
            <html>
            <body style='background:#000; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; margin:0;'>
                <div style='border: 2px solid #60a5fa; padding: 40px; border-radius: 20px; text-align:center;'>
                    <h1 style='background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;'>SYSTEM READY</h1>
                    <p style='color:#94a3b8; letter-spacing:2px;'>Awaiting Input from Sebcoolan Portal...</p>
                </div>
            </body>
            </html>
            ">
         iframe>
    </div>

<script>
    const YT_BASE = "https://www.youtube.com/embed/VIDEO_ID?rel=0&autoplay=1&controls=1";

    function syncYoutube() {
        let input = document.getElementById('ytInput').value.trim();
        let videoId = "";
        
        if (input.includes("shorts/")) videoId = input.split("shorts/")[1].split("?")[0];
        else if (input.includes("v=")) videoId = input.split("v=")[1].split("&")[0];
        else if (input.includes("youtu.be/")) videoId = input.split("youtu.be/")[1].split("?")[0];
        else videoId = input; 

        if (videoId.length < 5) { alert("Invalid ID!"); return; }

        let processedLink = YT_BASE.replace("VIDEO_ID", videoId);
        document.getElementById('urlInput').value = processedLink;
        
        loadUrl();
        document.getElementById('mirrorBtn').style.display = 'inline-block';
    }

    function loadUrl() {
        let url = document.getElementById('urlInput').value.trim();
        if(!url) return;

        if (!url.startsWith("http://") && !url.startsWith("https://")) {
            if (url.includes(".")) {
                url = "https://" + url;
                document.getElementById('urlInput').value = url;
            }
        }

        const iframe = document.getElementById('videoIframe');
        iframe.removeAttribute('srcdoc');
        
        iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen");
        iframe.setAttribute("allowfullscreen", "true");
        
        iframe.src = url;
        document.getElementById('actionControls').style.display = 'flex';

        if (!url.includes("youtube.com")) {
            document.getElementById('mirrorBtn').style.display = 'none';
        }
    }

    function switchMirror() {
        let currentUrl = document.getElementById('urlInput').value;
        if (currentUrl.includes("youtube.com/embed/")) {
            let mirrorUrl = currentUrl.replace("youtube.com", "youtube-nocookie.com");
            document.getElementById('urlInput').value = mirrorUrl;
            loadUrl();
            alert("Switched to Privacy Mirror");
        }
    }

    function toggleSemi() {
        document.body.classList.toggle('semi-active');
        document.getElementById('subLogo').style.display = document.body.classList.contains('semi-active') ? 'none' : 'block';
    }

    function totalFull() {
        let iframe = document.getElementById('videoIframe');
        if (iframe.requestFullscreen) iframe.requestFullscreen();
        else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape" && document.body.classList.contains('semi-active')) toggleSemi();
    });

    function saveLink() {
        let url = document.getElementById('urlInput').value;
        if(!url) return;
        let links = JSON.parse(localStorage.getItem('seb_links') || '[]');
        if(!links.includes(url)) {
            links.push(url);
            localStorage.setItem('seb_links', JSON.stringify(links));
            renderLinks();
        }
    }

    function renderLinks() {
        let links = JSON.parse(localStorage.getItem('seb_links') || '[]');
        document.getElementById('savedList').innerHTML = links.map(l => 
            `<button onclick="document.getElementById('urlInput').value='${l}'; loadUrl();" style="background:rgba(255,255,255,0.05); color:#94a3b8; font-size:10px; border:1px solid var(--glass-border); padding: 5px 10px; border-radius: 4px;">${l.substring(0,15)}...</button>`
        ).join('');
    }

    window.onload = renderLinks;
</script>
</body>
</html>
